<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .checkbox-group {
            margin-top: 10px;
        }
        .checkbox-group label {
            font-weight: normal;
            display: block;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #007bff;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Student Registration Form</h2>
        <form>

            <!-- Name -->
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required />

            <!-- Gender Dropdown -->
            <label for="gender">Gender</label>
            <select id="gender" name="gender" required>
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="nonbinary">Non-Binary</option>
                <option value="other">Other</option>
            </select>

            <!-- Age -->
            <label for="age">Age</label>
            <input type="number" id="age" name="age" min="1" placeholder="Enter your age" required />

            <!-- Highest Academic Certificate Dropdown -->
            <label for="certificate">Highest Academic Certificate</label>
            <select id="certificate" name="certificate" required>
                <option value="">Select Certificate</option>
                <option value="highschool">High School Certificate</option>
                <option value="diploma">College Diploma</option>
                <option value="vti">Vocational Training Institute Certificate</option>
                <option value="degree">University Degree</option>
            </select>

            <!-- Email -->
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required />

            <!-- Phone Number -->
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required />

            <!-- Religion (Checkbox) -->
            <label>Religion</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="religion" value="christianity" /> Christianity</label>
                <label><input type="checkbox" name="religion" value="islam" /> Islam</label>
                <label><input type="checkbox" name="religion" value="hindu" /> Hindu</label>
                <label><input type="checkbox" name="religion" value="buddhist" /> Buddhist</label>
                <label><input type="checkbox" name="religion" value="traditional" /> African Traditional</label>
                <label><input type="checkbox" name="religion" value="other" /> Other</label>
            </div>

            <!-- Submit Button -->
            <button type="submit">Submit Registration</button>
        </form>
    </div>
</body>
</html>
